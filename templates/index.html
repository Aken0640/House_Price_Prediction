<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI House Price Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:900px;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:40px;
        }

        .price-box{
            text-align:center;
            margin-bottom:35px;
        }

        .price{
            font-size:55px;
            color:#38bdf8;
            font-weight:bold;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:25px;
        }

        .slider-box{
            background:#334155;
            padding:20px;
            border-radius:15px;
        }

        label{
            font-size:18px;
            display:block;
            margin-bottom:10px;
        }

        .value{
            float:right;
            color:#38bdf8;
        }

        input[type=range]{
            width:100%;
        }
        
    </style>
</head>

<body>

<div class="container">

    <h1>🏠 AI House Price Predictor</h1>

    <div class="price-box">
        <div>Estimated House Price</div>
        <div class="price" id="price">$0</div>
    </div>

    <div class="grid">

        <div class="slider-box">
            <label>
                Overall Quality
                <span class="value" id="OverallQualValue">5</span>
            </label>

            <input type="range"
                   id="OverallQual"
                   min="1"
                   max="10"
                   value="5"
                   oninput="updateValue('OverallQual')">
        </div>

        <div class="slider-box">
            <label>
                Living Area
                <span class="value" id="GrLivAreaValue">1500</span>
            </label>

            <input type="range"
                   id="GrLivArea"
                   min="500"
                   max="5000"
                   value="1500"
                   oninput="updateValue('GrLivArea')">
        </div>

        <div class="slider-box">
            <label>
                Garage Cars
                <span class="value" id="GarageCarsValue">2</span>
            </label>

            <input type="range"
                   id="GarageCars"
                   min="0"
                   max="5"
                   value="2"
                   oninput="updateValue('GarageCars')">
        </div>

        <div class="slider-box">
            <label>
                Basement Area
                <span class="value" id="TotalBsmtSFValue">800</span>
            </label>

            <input type="range"
                   id="TotalBsmtSF"
                   min="0"
                   max="3000"
                   value="800"
                   oninput="updateValue('TotalBsmtSF')">
        </div>

        <div class="slider-box">
            <label>
                Full Bathrooms
                <span class="value" id="FullBathValue">2</span>
            </label>

            <input type="range"
                   id="FullBath"
                   min="0"
                   max="5"
                   value="2"
                   oninput="updateValue('FullBath')">
        </div>

        <div class="slider-box">
            <label>
                Year Built
                <span class="value" id="YearBuiltValue">2000</span>
            </label>

            <input type="range"
                   id="YearBuilt"
                   min="1900"
                   max="2025"
                   value="2000"
                   oninput="updateValue('YearBuilt')">
        </div>

    </div>

</div>

<script>

function updateValue(id){

    document.getElementById(id + "Value").innerText =
        document.getElementById(id).value;

    predictPrice();
}

async function predictPrice(){

    const data = {

        OverallQual: parseInt(document.getElementById("OverallQual").value),

        GrLivArea: parseFloat(document.getElementById("GrLivArea").value),

        GarageCars: parseInt(document.getElementById("GarageCars").value),

        TotalBsmtSF: parseFloat(document.getElementById("TotalBsmtSF").value),

        FullBath: parseInt(document.getElementById("FullBath").value),

        YearBuilt: parseInt(document.getElementById("YearBuilt").value)
    };

    try{

        const response = await fetch("http://127.0.0.1:8000/predict", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(data)
        });

        const result = await response.json();

        const price =
            result["Predicted House Price"];

        document.getElementById("price").innerText =
            "$" + price.toLocaleString();

    }

    catch(error){

        console.log(error);

        document.getElementById("price").innerText =
            "Server Error";
    }
}

predictPrice();

</script>

</body>
</html>
